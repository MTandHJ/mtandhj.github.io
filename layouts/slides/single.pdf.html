<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ .Title }} - PDF</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js@4.5.0/dist/reveal.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js@4.5.0/dist/theme/white.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js@4.5.0/plugin/highlight/monokai.css">
  {{ partial "math.html" . }}
  <style>
    .reveal, .reveal .slides { font-family: "Source Sans Pro", "Noto Sans CJK SC", "Noto Sans SC", sans-serif; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; }
    .reveal { width: 100%; height: 100%; }
    .reveal .slides section:not(:first-child) {
      top: 0 !important;
      bottom: 0 !important;
      transform: none !important;
    }
    .reveal .slides section:first-child {
      text-align: right;
    }
    .reveal .slides section:first-child h1,
    .reveal .slides section:first-child h2,
    .reveal .slides section:first-child h3 {
      text-align: center;
      text-transform: capitalize;
    }
    .reveal .slides section:not(:first-child) h1,
    .reveal .slides section:not(:first-child) h2,
    .reveal .slides section:not(:first-child) h3 {
      position: absolute;
      top: 0;
      left: -4rem;
      text-transform: none;
      color: #1F4E79 !important;
      font-weight: bold !important;
    }
    .reveal .slides section:not(:first-child) h1 { font-size: 55px; }
    .reveal .slides section:not(:first-child) h2 { font-size: 48px; }
    .reveal .slides section:not(:first-child) h3 { font-size: 40px; }
    .reveal .slides section:not(:first-child) {
      padding-top: 1.7em;
      text-align: left;
    }
    .reveal .slides section:not(:first-child) > *:not(h1):not(h2):not(h3) {
      margin-top: 1em;
      font-size: 0.8em;
    }
    .reveal .slides section ul,
    .reveal .slides section ol,
    .reveal .slides section p { text-align: left; }
    .reveal .slides section pre { width: auto; text-align: left; }
    .reveal .slides section ul > li { font-size: 1em !important; }
    .reveal .slides section ul ul > li { font-size: 0.8em !important; }
    .reveal .slides section ul ul ul > li { font-size: 0.7em !important; }
    .reveal .slides .slide-cols { display: flex; }
    .reveal .slides .slide-col-half { flex: 1; }
    .reveal .slides .slide-col-4 { flex: 4; }
    .reveal .slides .slide-col-6 { flex: 6; }
    .reveal .slides .slide-img { text-align: center; padding: 0; display: block; }
    .reveal .slides .slide-ref {
      position: absolute; bottom: 0; left: 0;
      font-size: 0.5em !important; text-align: left; color: #A6A6A6; width: 100%;
    }
    .reveal .slides .slide-highlight {
      display: flex; justify-content: center; align-items: center;
      font-size: 1.2em !important; font-weight: 700; color: #A10F2B;
      letter-spacing: 4px; font-family: "Microsoft YaHei", "Noto Sans CJK SC", sans-serif;
    }
    .reveal .slide-number {
      font-size: 1.5rem !important;
      right: 2.2em !important;
      bottom: 1.1em !important;
      background: none !important;
      color: gray !important;
    }
    .reveal .navigate-left { right: 6em !important; }
    .reveal .navigate-right { right: 1em !important; }
    .reveal .slides section ul { list-style: none !important; }
    .reveal .slides section ul > li {
      font-size: 1em !important;
      position: relative;
      padding-left: 0.4em !important;
    }
    .reveal .slides section ul > li::marker {
      content: "❯" !important;
      color: #1F4E79 !important;
    }
    .reveal .slides section ul ul > li {
      font-size: 0.8em !important;
      color: #444;
      position: static !important;
      padding-left: 0.5em !important;
    }
    .reveal .slides section ul ul > li::marker {
      content: "●" !important;
      color: #444 !important;
      font-size: 1em !important;
    }
    .reveal .slides section ul ul ul > li {
      font-size: 0.7em !important;
      color: #555;
      position: static !important;
      padding-left: 0.3em !important;
    }
    .reveal .slides section ul ul ul > li::marker {
      content: "■" !important;
      color: #555 !important;
      font-size: 1.2em !important;
    }
  </style>
</head>
<body>
  <div class="reveal">
    <div class="slides">{{ .Content }}</div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/reveal.js@4.5.0/dist/reveal.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/reveal.js@4.5.0/plugin/markdown/markdown.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/reveal.js@4.5.0/plugin/highlight/highlight.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/reveal.js@4.5.0/plugin/notes/notes.js"></script>
  <script>
    // --- slide-section 转换（Reveal.js 初始化前执行） ---
    document.querySelectorAll('.reveal .slides slide-section').forEach(function (el) {
      var section = document.createElement('section');
      section.setAttribute('data-markdown', '');
      var textarea = document.createElement('textarea');
      textarea.setAttribute('data-template', '');
      textarea.textContent = el.innerHTML;
      section.appendChild(textarea);
      el.replaceWith(section);
    });

    // --- 自定义标签转换（Reveal.js ready 后执行） ---
    function convertCustomTags() {
      document.querySelectorAll('.reveal .slides slide-img').forEach(function (el) {
        var src = el.getAttribute('src') || '';
        var size = el.getAttribute('size') || '80%';
        var div = document.createElement('div');
        div.className = 'slide-img';
        div.innerHTML = '<img src="' + src + '" alt="Image" style="max-width: ' + size + '; height: auto; margin: 0 auto;">';
        el.replaceWith(div);
      });
      document.querySelectorAll('.reveal .slides slide-cols').forEach(function (el) {
        var div = document.createElement('div');
        div.className = 'slide-cols';
        el.querySelectorAll('slide-col').forEach(function (col) {
          var ratio = col.getAttribute('ratio') || '1';
          var colDiv = document.createElement('div');
          colDiv.style.flex = ratio;
          colDiv.innerHTML = col.innerHTML;
          col.replaceWith(colDiv);
        });
        div.innerHTML = el.innerHTML;
        el.replaceWith(div);
      });
      document.querySelectorAll('.reveal .slides slide-ref').forEach(function (el) {
        var lines = el.textContent.split('\n').filter(function (l) { return l.trim(); });
        var div = document.createElement('div');
        div.className = 'slide-ref';
        var html = '<div style="width: 100px; height: 1px; background: black; margin-bottom: 5px;"></div>';
        lines.forEach(function (line) {
          html += '<p style="margin: 2px 0;">' + line.trim() + '</p>';
        });
        div.innerHTML = html;
        el.replaceWith(div);
      });
      document.querySelectorAll('.reveal .slides slide-highlight').forEach(function (el) {
        var div = document.createElement('div');
        div.className = 'slide-highlight';
        div.innerHTML = el.innerHTML;
        el.replaceWith(div);
      });
    }

    Reveal.initialize({
      embedded: true,
      hash: true,
      slideNumber: true,
      navigationMode: 'linear',
      transition: 'slide',
      controls: true,
      progress: true,
      margin: 0.07,
      width: 1050,
      minScale: 0.2,
      maxScale: 2.0,
      viewDistance: 3,
      overview: false,
      plugins: [RevealMarkdown, RevealHighlight, RevealNotes],
      markdown: { smartypants: true, gfm: true },
      mouseWheel: true,
      click: false
    });
    var layoutRaf = null;
    function scheduleRevealLayout() {
      if (typeof Reveal === 'undefined' || !Reveal.layout) return;
      if (layoutRaf) cancelAnimationFrame(layoutRaf);
      layoutRaf = requestAnimationFrame(function () {
        layoutRaf = null;
        Reveal.layout();
      });
    }
    var slideMathOpt = {
      delimiters: [
        {left: '$$', right: '$$', display: true},
        {left: '$', right: '$', display: false},
        {left: '\\[', right: '\\]', display: true},
        {left: '\\(', right: '\\)', display: false}
      ]
    };
    function renderSlideMath() {
      if (typeof renderMathInElement !== 'function') return;
      var el = document.querySelector('.reveal .slides');
      if (!el) return;
      renderMathInElement(el, slideMathOpt);
      scheduleRevealLayout();
    }
    Reveal.on('ready', function () {
      convertCustomTags();
      setTimeout(renderSlideMath, 80);
    });
    Reveal.on('slidechanged', function () { requestAnimationFrame(renderSlideMath); });
  </script>
</body>
</html>
