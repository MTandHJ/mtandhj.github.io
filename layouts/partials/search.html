
<!-- 保持隐藏的搜索触发器在所有页面都存在 -->
<li id="search-click" class="menu-item" style="display: none;">
    <a class="menu-item-link" href="javascript:void(0)">Search</a>
</li>

<script>
    // 快捷键功能
    document.addEventListener("keydown", function (event) {
        if ((event.ctrlKey || event.metaKey) && event.key.toLowerCase() === "k") {
            event.preventDefault();
            document.getElementById("search-click").click();
        }
    });
</script>

<!-- 搜索框和结果 -->
<div id="fastSearch">
    <div id="search-wrapper">
        <span id="searchBadge"></span>
        <span id="searchChips"></span>
        <input id="searchInput" autocomplete="off" placeholder="{{ .Site.Params.search.defaultPlaceholder }}">
    </div>
    <ul id="searchResults"></ul>
</div>

<script>
  window.__searchConfig = {
    defaultPlaceholder: {{ .Site.Params.search.defaultPlaceholder | jsonify }},
    tagPlaceholder: {{ .Site.Params.search.tagPlaceholder | jsonify }},
    postPlaceholder: {{ .Site.Params.search.postPlaceholder | jsonify }},
    slidePlaceholder: {{ .Site.Params.search.slidePlaceholder | jsonify }},
    noResults: {{ .Site.Params.search.noResults | jsonify }},
    maxResults: {{ .Site.Params.search.maxResults | default 15 }}
  };
</script>
{{ $search := resources.Get "js/search.js" | minify | fingerprint }}
<script type="text/javascript" src="{{ $search.RelPermalink }}"></script>
