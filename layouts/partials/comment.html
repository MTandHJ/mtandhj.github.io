<link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/@waline/client@v3/dist/waline.css"
/>
<div id="waline"></div>
<script type="module">
import { init } from 'https://cdn.jsdelivr.net/npm/@waline/client@v3/dist/waline.js';

init({
    el: '#waline',
    reaction: {{ .Site.Params.comment.reaction | default false }},
    serverURL: '{{ .Site.Params.comment.serverURL }}',
});
</script>
