{{- $isRun := false -}}
{{- with .Attributes.class -}}
  {{- $isRun = in . "run" -}}
{{- end -}}

{{- if $isRun -}}
<div class="pyodide-block">
  <div class="pyodide-toolbar">
    <button class="pyodide-run-btn" title="Run">▶ Run</button>
    <button class="pyodide-reset-btn" title="Reset">↺ Reset</button>
    <button class="pyodide-copy-btn" title="Copy">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M16 1H4C2.9 1 2 1.9 2 3V17H4V3H16V1ZM19 5H8C6.9 5 6 5.9 6 7V21C6 22.1 6.9 23 8 23H19C20.1 23 21 22.1 21 21V7C21 5.9 20.1 5 19 5ZM19 21H8V7H19V21Z"/>
      </svg>
    </button>
  </div>
  <script type="text/plain" class="pyodide-original">{{ .Inner }}</script>
  <pre class="pyodide-code" contenteditable="true" spellcheck="false"><code>{{ .Inner }}</code></pre>
  <div class="pyodide-output"></div>
</div>
{{- else -}}
  {{- transform.Highlight .Inner .Type .Options -}}
{{- end -}}
